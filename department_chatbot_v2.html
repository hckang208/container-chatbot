<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부서 AI 어시스턴트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 760px;
    margin: 0 auto;
    height: 100vh;
  }
  .header {
    background: #ffffff;
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .header-icon {
    width: 34px; height: 34px;
    background: #e8f0fe;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-icon svg { width: 18px; height: 18px; }
  .header-text h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .header-text p { font-size: 12px; color: #888; }
  .status {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #3cb371;
  }
  .status-dot { width: 7px; height: 7px; background: #3cb371; border-radius: 50%; }

  .chat-area {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
    min-height: 0;
  }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .avatar.bot { background: #e8f0fe; color: #3b5bdb; }
  .avatar.user-av { background: #f0f0f0; color: #555; border: 0.5px solid #ddd; }

  .bubble {
    max-width: 72%; padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.65; color: #1a1a1a;
  }
  .bubble.bot {
    background: #ffffff; border: 0.5px solid rgba(0,0,0,0.1);
    border-top-left-radius: 4px;
  }
  .bubble.user { background: #3b5bdb; color: #ffffff; border-top-right-radius: 4px; }
  .bubble.error { background: #fff0f0; color: #c0392b; border: 0.5px solid #fdd; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #aaa;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 4px 16px 12px;
  }
  .chip {
    padding: 6px 12px; background: #ffffff;
    border: 0.5px solid #ddd; border-radius: 20px;
    font-size: 13px; color: #555; cursor: pointer;
    transition: background 0.15s, color 0.15s; font-family: inherit;
  }
  .chip:hover { background: #f0f0f0; color: #1a1a1a; }

  .input-area {
    background: #ffffff; border-top: 0.5px solid rgba(0,0,0,0.1);
    padding: 12px 16px; display: flex; gap: 8px;
    align-items: flex-end; flex-shrink: 0;
  }
  textarea {
    flex: 1; padding: 10px 14px; font-size: 14px; font-family: inherit;
    border: 0.5px solid #ccc; border-radius: 12px;
    background: #f8f8f8; color: #1a1a1a; resize: none;
    min-height: 42px; max-height: 120px; line-height: 1.5;
    outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: #3b5bdb; background: #fff; }
  textarea::placeholder { color: #bbb; }

  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: #3b5bdb; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s, background 0.15s;
  }
  .send-btn:hover { background: #2f4cad; }
  .send-btn:disabled { opacity: 0.35; cursor: default; }
  .send-btn svg { width: 17px; height: 17px; }

  .timestamp { font-size: 11px; color: #bbb; text-align: center; margin: 4px 0; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
</style>

function buildDocument() {
  let doc = `[HANSOLL CONTAINER CONTACT PERSON] (Updated: ${DATA_UPDATED})\n`;
  doc += `공지: ${NOTICES.packing_list}\n\n`;

    doc += `NO.${r.no} | ${loc} | ${r.factory}\n`;
    doc += `  선적일: ${r.ship_day}\n`;
    if (r.biweekly && r.contact2_kr) {
      doc += `  담당자(격주 로테이션):\n`;
      doc += `    ① ${r.contact_kr}(${r.contact_en}) / 이메일: ${r.email} / TEL: ${r.tel}\n`;

    }
    if (r.prev_person) doc += `  이전 담당자: ${r.prev_person}\n`;
    doc += "\n";
  }

    doc += `  선적 가능 요일: ${r.ship_days}\n`;

const chatArea = document.getElementById('chatArea');
const inputBox = document.getElementById('inputBox');
const sendBtn  = document.getElementById('sendBtn');
const chipsEl  = document.getElementById('chips');

let isLoading = false;
const history = [];

inputBox.addEventListener('input', () => {
  sendBtn.disabled = !inputBox.value.trim() || isLoading;
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function useChip(btn) {
  inputBox.value = btn.textContent;
  autoResize(inputBox);
  sendBtn.disabled = false;
  chipsEl.style.display = 'none';
  sendMessage();
}

function addMsg(role, text, isError) {
  const wrap = document.createElement('div');
  wrap.className = 'msg' + (role === 'user' ? ' user' : '');

  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user-av' : 'bot');
  av.textContent = role === 'user' ? '나' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (isError ? 'error' : role === 'user' ? 'user' : 'bot');
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  if (role === 'user') {
    wrap.appendChild(bubble);
    wrap.appendChild(av);
  } else {
    wrap.appendChild(av);
    wrap.appendChild(bubble);
  }
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = '<div class="avatar bot">AI</div><div class="bubble bot"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || isLoading) return;

  chipsEl.style.display = 'none';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  inputBox.value = '';
  autoResize(inputBox);
  sendBtn.disabled = true;
  isLoading = true;
  showTyping();

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer YOUR_OPENAI_API_KEY_HERE'   // ← API 키 입력
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    const data = await res.json();
    if (!res.ok) {
      const errMsg = data?.error?.message || JSON.stringify(data);
      throw new Error(`${res.status}: ${errMsg}`);
    }
    const reply = data.choices?.[0]?.message?.content || '응답을 받지 못했습니다.';
    removeTyping();
    addMsg('assistant', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (e) {
    removeTyping();
    addMsg('assistant', '⚠️ 오류: ' + e.message, true);
  }

  isLoading = false;
  sendBtn.disabled = !inputBox.value.trim();
  inputBox.focus();
}
</script>
</body>
</html>
